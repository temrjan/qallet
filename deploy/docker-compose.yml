services:
  rustok-api:
    build:
      context: ..
      dockerfile: crates/api/Dockerfile
    container_name: rustok-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - RUST_LOG=info
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    container_name: rustok-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
