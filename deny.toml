# cargo-deny configuration for Rustok
# Run: cargo deny check

[graph]
all-features = true

[advisories]
ignore = [
    { id = "RUSTSEC-2024-0436", reason = "paste is transitive dep via revm, no alternative yet" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "OpenSSL",
    "AGPL-3.0-or-later",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# Workspace crates use path deps without version (expected)
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
