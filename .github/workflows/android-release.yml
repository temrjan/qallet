name: Android Release Build

on:
  workflow_dispatch:
    inputs:
      build_all_targets:
        description: 'Build universal AAB for all ABIs (slow, ~30 min)'
        required: false
        default: false
        type: boolean
      upload_to_play_console:
        description: 'Upload AAB to Google Play Console after build'
        required: false
        default: false
        type: boolean
      track:
        description: 'Play Console track (used when upload is enabled)'
        required: false
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      status:
        description: 'Release status (used when upload is enabled)'
        required: false
        default: 'completed'
        type: choice
        options:
          - completed
          - draft

env:
  CARGO_TERM_COLOR: always

jobs:
  android-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and NDK
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;29.0.13846066"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Install trunk
        run: cargo install trunk --locked

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Setup release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set. See docs/ANDROID-RELEASE.md for setup instructions."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/rustok-release.keystore
          cat > app/src-tauri/gen/android/keystore.properties <<EOF
          storeFile=/tmp/rustok-release.keystore
          keyAlias=$KEY_ALIAS
          password=$KEY_PASSWORD
          EOF

      - name: Build Android release AAB
        run: |
          cd app
          if [ "${{ inputs.build_all_targets }}" == "true" ]; then
            cargo tauri android build --aab
          else
            cargo tauri android build --aab --target aarch64
          fi
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/29.0.13846066

      - name: Find AAB file
        id: find_aab
        run: |
          AAB_PATH=$(find app/src-tauri/gen/android/app/build/outputs/bundle -name "*.aab" | head -1)
          if [ -z "$AAB_PATH" ]; then
            echo "::error::No AAB file found in build outputs"
            exit 1
          fi
          echo "aab_path=$AAB_PATH" >> "$GITHUB_OUTPUT"
          echo "Found AAB: $AAB_PATH"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustok-android-release-aab
          path: ${{ steps.find_aab.outputs.aab_path }}
          if-no-files-found: error

      - name: Upload to Google Play
        if: ${{ inputs.upload_to_play_console == true }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.rustok.app
          releaseFiles: ${{ steps.find_aab.outputs.aab_path }}
          track: ${{ inputs.track }}
          status: ${{ inputs.status }}
